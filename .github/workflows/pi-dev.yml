name: Pi Coding Agent
on:
  issue_comment:
    types: [created]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  pi-agent:
    if: contains(github.event.comment.body, '/pi')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      #- name: Setup Node
      #  uses: actions/setup-node@v6
      #  with:
      #    node-version: 24

      #- name: Pi Review
      #  uses: shaftoe/pi-coding-agent-action@v2
      #  with:
      #    provider: 'gcloud'
      #    model: 'claude-opus-4-6'
      #    github_token: ${{ secrets.WORKFLOW_GITHUB_TOKEN }}
      #    token: ${{ secrets.COPILOT_AGENT_TOKEN }}
      #    thinking_level: medium
      #    extensions:
      #      git:https://github.com/maxandersen/pi-vertex-anthropic

      - name: auth
        uses: 'google-github-actions/auth@v3'
        with:
          # This automatically sets GOOGLE_APPLICATION_CREDENTIALS for Pi
          credentials_json: '${{ secrets.GOOGLE_CLOUD_CREDENTIALS }}'

      #- name: Create GCP Credentials File
      #  run: |
      #     # Create a directory and write the secret to a JSON file
      #     mkdir -p ~/.config/gcloud
      #     echo '${{ secrets.GOOGLE_CLOUD_CREDENTIALS }}' > ~/.config/gcloud/service-account.json
      #
      #     # Export the path to the environment for subsequent steps
      #     echo "GOOGLE_APPLICATION_CREDENTIALS=$HOME/.config/gcloud/service-account.json" >> $GITHUB_ENV
        
      - name: Run Pi.dev Agent
        env:
          GOOGLE_CLOUD_PROJECT: itpc-gcp-cp-pe-eng-claude
          GOOGLE_CLOUD_LOCATION: europe-west1
          # The variable is already in GITHUB_ENV, but we can be explicit:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ env.GOOGLE_APPLICATION_CREDENTIALS }}
        run: |
          npm install -g @mariozechner/pi-coding-agent
          pi install https://github.com/maxandersen/pi-vertex-anthropic
          
          echo "Google Vrertex Credentials"
          echo $GOOGLE_APPLICATION_CREDENTIALS
          
          # Now Pi should see the file perfectly
          pi "${{ github.event.comment.body }}" \
            --provider vertex-anthropic \
            --model claude-4-6-opus \
            -p