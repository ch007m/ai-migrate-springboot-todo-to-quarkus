name: Pi Coding Agent
on:
  issue_comment:
    types: [created]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  pi-agent:
    if: contains(github.event.comment.body, '/pi')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      #- name: Setup Node
      #  uses: actions/setup-node@v6
      #  with:
      #    node-version: 24

      #- name: Pi Review
      #  uses: shaftoe/pi-coding-agent-action@v2
      #  with:
      #    provider: 'gcloud'
      #    model: 'claude-opus-4-6'
      #    github_token: ${{ secrets.WORKFLOW_GITHUB_TOKEN }}
      #    token: ${{ secrets.COPILOT_AGENT_TOKEN }}
      #    thinking_level: medium
      #    extensions:
      #      git:https://github.com/maxandersen/pi-vertex-anthropic

      - uses: 'google-github-actions/auth@v3'
        with:
          credentials_json: '${{ secrets.GOOGLE_CLOUD_CREDENTIALS }}'

      - name: Pi.dev
        run: |
          npm install -g @mariozechner/pi-coding-agent
          pi install https://github.com/maxandersen/pi-vertex-anthropic
          gcloud auth application-default login
          export GOOGLE_CLOUD_PROJECT=itpc-gcp-cp-pe-eng-claude
          export GOOGLE_CLOUD_LOCATION=europe-west1
          
          pi -p "Summarize this codebase"