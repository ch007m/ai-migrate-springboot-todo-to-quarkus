# Quarkus HTTP port (migrated from server.port=8081)
quarkus.http.port=8081

# MySQL datasource configuration (migrated from spring.datasource.*)
quarkus.datasource.db-kind=mysql
quarkus.datasource.jdbc.url=jdbc:mysql://127.0.0.1:3306/todo
quarkus.datasource.username=root
quarkus.datasource.password=root

# Hibernate configuration (migrated from spring.jpa.*)
quarkus.hibernate-orm.database.generation=update
quarkus.hibernate-orm.log.sql=true
# Dialect is auto-detected by Quarkus from db-kind — no need to set explicitly
# REMOVED: spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# Physical naming strategy: Spring Boot defaults to snake_case; preserve that behavior
quarkus.hibernate-orm.physical-naming-strategy=org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy

# Qute template configuration (replaces Thymeleaf)
# Relaxed during migration — missing template variables won't throw exceptions
quarkus.qute.strict-rendering=false
quarkus.qute.property-not-found-strategy=output-original
