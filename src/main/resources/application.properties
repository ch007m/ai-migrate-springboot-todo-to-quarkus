# Quarkus HTTP port (was server.port=8081)
quarkus.http.port=8081

# MySQL datasource configuration
# (was spring.datasource.url / spring.datasource.username / spring.datasource.password)
quarkus.datasource.db-kind=mysql
quarkus.datasource.jdbc.url=jdbc:mysql://127.0.0.1:3306/todo
quarkus.datasource.username=root
quarkus.datasource.password=root

# Hibernate configuration
# (was spring.jpa.hibernate.ddl-auto=update)
quarkus.hibernate-orm.schema-management.strategy=update
# (was spring.jpa.show-sql=true)
quarkus.hibernate-orm.log.sql=true
# Dialect is auto-detected from db-kind — no need to set explicitly
# REMOVED: spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
#   Reason: Quarkus auto-detects the dialect from quarkus.datasource.db-kind=mysql

# Naming strategy: Spring Boot defaults to snake_case; preserve that behaviour
quarkus.hibernate-orm.physical-naming-strategy=org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy

# Qute strict-rendering relaxed during migration (Thymeleaf was lenient with missing vars)
quarkus.qute.strict-rendering=false
quarkus.qute.property-not-found-strategy=output-original
