# Quarkus HTTP port
quarkus.http.port=8081

# MySQL datasource configuration
quarkus.datasource.db-kind=mysql
%prod.quarkus.datasource.jdbc.url=jdbc:mysql://127.0.0.1:3306/todo
%prod.quarkus.datasource.username=root
%prod.quarkus.datasource.password=root
%dev.quarkus.datasource.jdbc.url=jdbc:mysql://127.0.0.1:3306/todo
%dev.quarkus.datasource.username=root
%dev.quarkus.datasource.password=root

# Hibernate configuration
quarkus.hibernate-orm.database.generation=update
quarkus.hibernate-orm.log.sql=true
quarkus.hibernate-orm.physical-naming-strategy=org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy

# Test configuration — MySQL Docker container via Quarkus Dev Services
%test.quarkus.http.test-port=0
%test.quarkus.devservices.enabled=true
%test.quarkus.datasource.devservices.enabled=true
%test.quarkus.datasource.devservices.image-name=mysql:8.0
%test.quarkus.hibernate-orm.database.generation=drop-and-create
%test.quarkus.hibernate-orm.log.sql=true
