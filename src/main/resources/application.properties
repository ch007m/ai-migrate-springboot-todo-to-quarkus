# HTTP port
quarkus.http.port=8081

# MySQL datasource configuration
quarkus.datasource.db-kind=mysql
quarkus.datasource.jdbc.url=jdbc:mysql://127.0.0.1:3306/todo
quarkus.datasource.username=root
quarkus.datasource.password=root

# Hibernate configuration
quarkus.hibernate-orm.database.generation=update
quarkus.hibernate-orm.log.sql=true

# Qute template configuration (relaxed during migration from Thymeleaf)
quarkus.qute.strict-rendering=false
quarkus.qute.property-not-found-strategy=output-original

# Test profile: use same DB but different test port
%test.quarkus.http.test-port=8083
%test.quarkus.datasource.jdbc.url=jdbc:mysql://127.0.0.1:3306/todo
